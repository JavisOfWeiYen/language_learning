<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="語言大師">
<title>語言大師 Language Master</title>

<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/home.css">
<link rel="stylesheet" href="styles/words.css">
<link rel="stylesheet" href="styles/add.css">
<link rel="stylesheet" href="styles/quiz.css">
<link rel="stylesheet" href="styles/wrong.css">

<script type="module" src="js/app.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🎓 語言<span>大師</span></div>
    <div style="font-size:11px;color:var(--text-muted);font-weight:400;letter-spacing:0.04em">v1.10</div>
  </div>
  <div class="header-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')" title="英文">🇬🇧</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')" title="日文">🇯🇵</button>
      <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')" title="韓文">🇰🇷</button>
    </div>
    <div class="xp-badge"><span class="star">✨</span><span id="headerXP">0</span> XP</div>
    <div class="level-badge" id="headerLevel">Lv.1</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showScreen('home')" id="nav-home">
    <span class="icon">🏠</span>首頁
  </button>
  <button class="nav-btn" onclick="showScreen('words')" id="nav-words">
    <span class="icon">📖</span>單字庫
  </button>
  <button class="nav-btn" onclick="showScreen('add')" id="nav-add">
    <span class="icon">➕</span>新增
  </button>
  <button class="nav-btn" onclick="showScreen('quiz')" id="nav-quiz">
    <span class="icon">🎯</span>測驗
  </button>
  <button class="nav-btn" onclick="showScreen('wrong')" id="nav-wrong">
    <span class="icon">❌</span>錯題本
  </button>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hero-card">
    <div class="hero-greeting">歡迎回來</div>
    <div class="hero-level" id="heroLevelName">入門</div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="heroXpBar" style="width:0%"></div></div>
    <div class="xp-label" id="heroXpLabel">0 / 100 XP</div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">📚</div>
      <div class="stat-num" id="statWords">0</div>
      <div class="stat-label">學過的字</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🎯</div>
      <div class="stat-num" id="statQuizzes">0</div>
      <div class="stat-label">完成測驗</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-num" id="statCorrect">0</div>
      <div class="stat-label">答對次數</div>
    </div>
  </div>
  <div class="section-title">快速開始</div>
  <div class="quick-actions">
    <button class="action-btn quiz" onclick="showScreen('quiz')">
      <span class="icon">🎯</span>開始測驗
    </button>
    <button class="action-btn add" onclick="showScreen('add')">
      <span class="icon">✏️</span>新增單字
    </button>
    <button class="action-btn review" onclick="showScreen('words')">
      <span class="icon">📖</span>複習單字
    </button>
    <button class="action-btn wrong" onclick="showScreen('wrong')">
      <span class="icon">📝</span>錯題本
    </button>
  </div>
</div>

<!-- WORDS -->
<div class="screen" id="screen-words">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋單字..." oninput="renderWordList()">
  </div>
  <div id="wordListContainer"></div>
</div>

<!-- ADD -->
<div class="screen" id="screen-add">
  <div class="add-card">
    <h3>新增單字</h3>
    <div class="input-group">
      <label id="label-addWord">韓文單字</label>
      <input type="text" id="addWord" placeholder="例：사과">
    </div>
    <div class="input-group">
      <label>詞性</label>
      <input type="text" id="addPos" placeholder="例：n. 名詞 / v. 動詞">
    </div>
    <div class="input-group">
      <label>中文翻譯</label>
      <input type="text" id="addZh" placeholder="例:蘋果">
    </div>
    <div class="input-group">
      <label>例句</label>
      <textarea id="addSentence" placeholder="例：저는 사과를 좋아해요."></textarea>
    </div>
    <button class="submit-btn" onclick="addWord()">加入單字庫</button>
  </div>
  <div class="add-card">
    <h3>新增句子</h3>
    <div class="input-group">
      <label id="label-addSentenceEn">韓文句子</label>
      <textarea id="addSentenceEn" placeholder="例：그녀는 매일 학교에 가요."></textarea>
    </div>
    <div class="input-group">
      <label>中文翻譯</label>
      <input type="text" id="addSentenceZh" placeholder="例：她每天去上學。">
    </div>
    <button class="submit-btn" onclick="addSentence()">加入句子庫</button>
  </div>

  <!-- 快速貼上批量新增 -->
  <div class="add-card">
    <h3>批量新增 (貼上文字)</h3>
    <p id="bulkHelp" style="font-size:13px;color:var(--text-soft);margin-bottom:12px;line-height:1.6">
      每行一筆單字，用逗號分隔。欄位順序：<br>
      <b id="bulkFormatHint">韓文, 中文, 詞性, 例句</b>（後兩欄可留空）<br>
      <span style="color:var(--text-muted);font-size:12px">中英文逗號皆可。</span>
    </p>
    <div class="input-group" style="margin-bottom:10px">
      <textarea id="bulkInput" placeholder="사과, 蘋果, n., 저는 사과를 좋아해요.&#10;책, 書, n., 이것은 제 책입니다.&#10;가다, 去, v." style="min-height:140px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:13px;line-height:1.6" oninput="bulkPreview()"></textarea>
    </div>
    <div id="bulkPreviewBox" style="display:none;margin-bottom:10px"></div>
    <button class="submit-btn" id="bulkSubmitBtn" onclick="bulkImport()" disabled>匯入</button>
  </div>

  <!-- CSV 匯入 / 匯出 -->
  <div class="add-card">
    <h3>單字庫匯入 / 匯出 (CSV)</h3>
    <p id="csvHelp" style="font-size:13px;color:var(--text-soft);margin-bottom:12px;line-height:1.6">
      CSV 欄位順序：<b>韓文,中文,詞性,例句</b>（後兩欄可留空）。<br>
      用 Excel 或 Google 試算表打開時請選 UTF-8 編碼。
    </p>
    <button class="submit-btn" style="margin-bottom:10px" onclick="exportCSV()">匯出目前單字庫</button>
    <label for="csvFileInput" class="submit-btn" style="display:block;text-align:center;cursor:pointer;margin:0;background:var(--card);color:var(--text);border:1px solid var(--border-strong)">
      匯入 CSV 檔案
    </label>
    <input id="csvFileInput" type="file" accept=".csv,text/csv" onchange="importCSV(event)" style="display:none">
    <div id="csvStatus" style="display:none;margin-top:10px;font-size:13px;font-weight:700"></div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div id="quizMenu" class="quiz-menu">
    <div class="section-title">選擇測驗方式</div>
    <button class="quiz-option" onclick="startQuiz('spelling')">
      <span class="quiz-option-icon">🔊</span>
      <div class="quiz-option-text">
        <div class="quiz-option-title" id="quiz-spelling-title">韓聽拼寫單字</div>
        <div class="quiz-option-desc" id="quiz-spelling-desc">聽到韓文，把單字拼出來</div>
      </div>
      <span class="quiz-option-arrow">›</span>
    </button>
    <button class="quiz-option" onclick="startQuiz('sentence')">
      <span class="quiz-option-icon">🎧</span>
      <div class="quiz-option-text">
        <div class="quiz-option-title" id="quiz-sentence-title">韓聽寫出句子</div>
        <div class="quiz-option-desc" id="quiz-sentence-desc">聽到韓文句子，把它寫出來</div>
      </div>
      <span class="quiz-option-arrow">›</span>
    </button>
    <button class="quiz-option" onclick="startQuiz('cloze')">
      <span class="quiz-option-icon">✏️</span>
      <div class="quiz-option-text">
        <div class="quiz-option-title">克漏字測驗</div>
        <div class="quiz-option-desc">看句子，填入空格的單字</div>
      </div>
      <span class="quiz-option-arrow">›</span>
    </button>
    <button class="quiz-option" onclick="startQuiz('mixed')">
      <span class="quiz-option-icon">🎰</span>
      <div class="quiz-option-text">
        <div class="quiz-option-title">綜合測驗</div>
        <div class="quiz-option-desc">混合所有題型，全面練習！</div>
      </div>
      <span class="quiz-option-arrow">›</span>
    </button>
  </div>

  <div id="quizPlay" class="quiz-play">
    <div class="quiz-header">
      <div class="quiz-progress-text" id="quizProgressText">第 1 題 / 共 10 題</div>
      <div class="quiz-score-text" id="quizScoreText">0 / 0</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="quizProgressBar" style="width:0%"></div></div>
    <div class="question-card" id="questionCard">
      <!-- dynamic -->
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
      <div class="feedback-answer" id="feedbackAnswer"></div>
    </div>
    <button class="check-btn" id="checkBtn" onclick="checkAnswer()">✓ 確認答案</button>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
  </div>

  <div id="quizResult" class="quiz-result">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title">測驗完成！</div>
    <div class="result-score" id="resultScore">8 / 10</div>
    <div class="result-xp" id="resultXP">+40 XP 獲得！</div>
    <button class="result-back-btn" onclick="resetQuiz()">再玩一次 🔄</button>
  </div>
</div>

<!-- WRONG -->
<div class="screen" id="screen-wrong">
  <div class="section-title">錯題本</div>
  <div id="wrongContainer"></div>
</div>

<div class="toast" id="toast"></div>

</body>
</html>
